<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>make & 彬彬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "微软雅黑", sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 正常流星：左上 → 右下 */
        .meteor-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .meteor {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(45deg, #fff, transparent);
            border-radius: 2px;
            transform: rotate(-45deg);
            animation: meteor linear infinite;
        }
        @keyframes meteor {
            0% {
                transform: translate(0, 0) rotate(-45deg);
                opacity: 1;
            }
            100% {
                transform: translate(120vw, 120vh) rotate(-45deg);
                opacity: 0;
            }
        }

        /* 简约标题 */
        .title {
            font-size: 42px;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        /* 主角名字 */
        .names {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 32px;
            color: #ccc;
        }
        .dot {
            color: #666;
        }

        /* 底部小字 */
        .desc {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="meteor-container" id="meteorContainer"></div>

    <div class="title">make & 彬彬</div>
    <div class="names">
        <span>make</span>
        <span class="dot">·</span>
        <span>彬彬</span>
    </div>
    <div class="desc">星光相伴 · 温柔同行</div>

    <script>
        // 正常流星：左上 → 右下
        function createMeteor() {
            const container = document.getElementById('meteorContainer');
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            
            meteor.style.left = Math.random() * 60 + 'vw';
            meteor.style.top = Math.random() * 40 + 'vh';
            meteor.style.animationDuration = (Math.random() * 1.2 + 0.8) + 's';
            meteor.style.height = (Math.random() * 40 + 40) + 'px';
            
            container.appendChild(meteor);
            setTimeout(() => meteor.remove(), 2500);
        }
        setInterval(createMeteor, 120);
    </script>
</body>
</html>
